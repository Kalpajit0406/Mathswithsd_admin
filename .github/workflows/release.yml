name: Build & Release Beta APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0-beta.1)'
        required: true
        default: 'v1.0.0-beta'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Prepare APK for Release
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/mathswithsd-admin-beta.apk

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: true
          files: release-artifacts/mathswithsd-admin-beta.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
